[defaults]
bind_address = "127.0.0.1"
auto_connect = false
auto_reconnect = true

# Uncomment to explicitly set 1Password SSH Agent socket path.
# If omitted, the SSH_AUTH_SOCK environment variable is inherited.
# ssh_auth_sock = "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"

# SSH user/port can be set here as defaults, but it's recommended
# to configure them in ~/.ssh/config instead.
# ssh_user = "myuser"
# ssh_port = 22

# Local forwarding (default): ssh -L bind_address:local_port:forward_host:remote_port
[tunnels.my-service]
local_port = 9022
remote_port = 9022
forward_host = "localhost"
ssh_host = "bastion"        # Use a Host alias from ~/.ssh/config
auto_connect = true

[tunnels.dev-db]
local_port = 5432
remote_port = 5432
forward_host = "db.internal"
ssh_host = "bastion"
# auto_connect = false      # default
# auto_reconnect = true     # default

# Remote forwarding: ssh -R bind_address:remote_port:forward_host:local_port
# Exposes a local service on the remote server.
[tunnels.expose-dev-server]
mode = "remote"
local_port = 3000             # local service port
remote_port = 8080            # port to listen on the remote server
ssh_host = "bastion"

# Dynamic forwarding (SOCKS proxy): ssh -D bind_address:local_port
# remote_port and forward_host are not used.
[tunnels.socks-proxy]
mode = "dynamic"
local_port = 1080
ssh_host = "bastion"
auto_connect = true
